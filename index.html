<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Album Cover Gallery</title>
    <link rel="icon" type="image/png" href="favicon.png">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <section class="cover-hero" id="cover-page">
        <div class="cover-tiles-bg" id="cover-tiles"></div>
        <div class="cover-content">
            <h1 class="cover-title">Album Cover Gallery</h1>
            <p class="cover-subtitle">探索独特的专辑封面艺术</p>
            <p class="cover-description">多种风格 · AI 生成</p>
            <button class="cover-enter-btn" id="enter-gallery">
                <span>进入画廊</span>
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M5 12h14M12 5l7 7-7 7"/>
                </svg>
            </button>
        </div>
    </section>

    <div id="gallery-page">
        <header>
            <h1>Album Cover Gallery</h1>
            <nav class="filter-bar" role="navigation" aria-label="Filter by style">
                <button class="filter-btn active" data-filter="all">All</button>
                <button class="filter-btn" data-filter="lofi">Lofi</button>
                <button class="filter-btn" data-filter="minimal">Minimal</button>
                <button class="filter-btn" data-filter="collage">Collage</button>
                <button class="filter-btn" data-filter="psychedelic">Psychedelic</button>
                <button class="filter-btn" data-filter="sketch">Sketch</button>
                <button class="filter-btn" data-filter="gothic">Gothic</button>
                <button class="filter-btn" data-filter="nature">Nature</button>
                <button class="filter-btn" data-filter="glitch">Glitch</button>
                <button class="filter-btn" data-filter="ugly-design">Ugly Design</button>
                <button class="filter-btn" data-filter="zen">Zen</button>
            </nav>
        </header>

        <main>
            <div id="gallery" class="gallery-grid"></div>
        </main>

        <div id="lightbox" class="lightbox" role="dialog" aria-modal="true" aria-label="Image viewer" hidden>
            <button class="lightbox-close" aria-label="Close">&times;</button>
            <button class="lightbox-nav lightbox-prev" aria-label="Previous image">&#10094;</button>
            <button class="lightbox-nav lightbox-next" aria-label="Next image">&#10095;</button>
            <div class="lightbox-content">
                <img id="lightbox-img" src="" alt="Album cover">
            </div>
            <div class="lightbox-info">
                <span id="lightbox-counter"></span>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
    <script>
        (async function() {
            try {
                const resp = await fetch("manifest.json");
                const manifest = await resp.json();
                const container = document.getElementById("cover-tiles");
                const totalTiles = 240;
                const shuffled = manifest.sort(() => Math.random() - 0.5).slice(0, totalTiles);
                shuffled.forEach((entry) => {
                    const tile = document.createElement("div");
                    tile.className = "cover-tile";
                    const img = document.createElement("img");
                    img.src = entry.thumbPath;
                    img.alt = "";
                    tile.appendChild(img);
                    container.appendChild(tile);
                });
            } catch (err) {
                console.error("Failed to load cover tiles:", err);
            }
        })();

        document.getElementById("enter-gallery").addEventListener("click", function() {
            document.getElementById("cover-page").style.display = "none";
            document.getElementById("gallery-page").style.display = "block";
        });
    </script>
</body>
</html>
